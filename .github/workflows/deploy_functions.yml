name: Deploy ML Training Functions

on:
  push:
    branches: [main]
    paths:
      - "azure_function/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r azure_function/requirements.txt --target azure_function/.python_packages/lib/site-packages

      - name: Login to Azure
        run: |
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip and deploy
        run: |
          cd azure_function && zip -r ../deploy.zip . -x "*.pyc" -x "__pycache__/*"
          cd ..
          az functionapp deployment source config-zip \
            --name ukfuel-ml \
            --resource-group uk-fuel-rg \
            --src deploy.zip \
            --build-remote false
