name: Deploy ML Training Functions

on:
  push:
    branches: [main]
    paths:
      - "azure_function/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r azure_function/requirements.txt --target azure_function/.python_packages/lib/site-packages

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip package
        run: cd azure_function && zip -r ../deploy.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy via zip
        run: |
          az functionapp deployment source config-zip \
            --name ukfuel-ml \
            --resource-group uk-fuel-rg \
            --src deploy.zip \
            --build-remote false
